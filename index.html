<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rive Source Coverage</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101317;
        --panel: #191e24;
        --panel-2: #20262e;
        --text: #eef3f5;
        --muted: #9aa7b2;
        --line: #323b45;
        --good: #46c48f;
        --work: #e1ae43;
        --bad: #ec6b68;
        --info: #6fa8ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      main {
        width: min(1440px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        font-weight: 760;
      }

      h2 {
        font-size: 18px;
        margin-bottom: 12px;
      }

      h3 {
        font-size: 14px;
        font-weight: 680;
      }

      .subtle,
      .meta {
        color: var(--muted);
      }

      .meta {
        font-size: 12px;
      }

      .grid {
        display: grid;
        gap: 14px;
        min-width: 0;
      }

      .summary {
        grid-template-columns: repeat(5, minmax(160px, 1fr));
        margin: 18px 0;
      }

      .columns {
        grid-template-columns: minmax(0, 1.25fr) minmax(340px, 0.75fr);
        align-items: start;
      }

      .panel,
      .metric,
      .task,
      .timeline-item {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .panel {
        padding: 16px;
        min-width: 0;
      }

      .metric {
        padding: 14px;
        min-height: 136px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .metric-value {
        font-size: 26px;
        font-weight: 760;
        margin: 8px 0;
      }

      .bar {
        height: 10px;
        overflow: hidden;
        background: #0d1014;
        border: 1px solid #2a333c;
        border-radius: 999px;
      }

      .bar span {
        display: block;
        height: 100%;
        width: var(--value);
        background: var(--color, var(--good));
      }

      .domain-list {
        display: grid;
        gap: 9px;
      }

      .domain-row {
        display: grid;
        grid-template-columns: 150px minmax(160px, 1fr) 92px 92px;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
      }

      .domain-row:last-child {
        border-bottom: 0;
      }

      .domain-name {
        text-transform: capitalize;
        font-weight: 650;
      }

      .stacked {
        display: flex;
        height: 14px;
        overflow: hidden;
        background: #0d1014;
        border: 1px solid #2a333c;
        border-radius: 999px;
      }

      .stacked span {
        min-width: 2px;
      }

      .proven {
        background: var(--good);
      }

      .type-only {
        background: var(--work);
      }

      .preserve {
        background: var(--info);
      }

      .remaining {
        background: #3a414a;
      }

      .task,
      .timeline-item {
        padding: 12px;
        margin-bottom: 10px;
      }

      .task-head,
      .timeline-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 6px;
      }

      .pill {
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid var(--line);
        color: var(--muted);
        white-space: nowrap;
      }

      .pill.active,
      .pill.candidate,
      .pill.investigating {
        color: #161a1f;
        background: var(--work);
        border-color: var(--work);
      }

      .pill.blocked {
        color: #1d1111;
        background: var(--bad);
        border-color: var(--bad);
      }

      .pill.done {
        color: #0c1f17;
        background: var(--good);
        border-color: var(--good);
      }

      .gap-table {
        width: 100%;
        border-collapse: collapse;
      }

      .gap-table th,
      .gap-table td {
        padding: 9px 8px;
        text-align: left;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
        font-size: 13px;
      }

      .gap-table th {
        color: var(--muted);
        font-weight: 620;
      }

      .gap-table td {
        overflow-wrap: anywhere;
      }

      .two-up {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      @media (max-width: 1100px) {
        .summary,
        .columns,
        .two-up {
          grid-template-columns: 1fr;
        }

        .columns > *,
        aside,
        section {
          min-width: 0;
        }

        .domain-row {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 520px) {
        main {
          width: min(100vw - 18px, 520px);
          padding-top: 16px;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
          gap: 8px;
        }

        h1 {
          font-size: 26px;
        }

        .gap-table {
          display: block;
          overflow-x: auto;
        }

        .gap-table th,
        .gap-table td {
          min-width: 92px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Rive Source Coverage</h1>
          <p id="wave" class="subtle"></p>
        </div>
        <p id="refresh" class="meta">Loading...</p>
      </header>

      <section id="summary" class="grid summary"></section>

      <section class="grid columns">
        <div class="grid">
          <section class="panel">
            <h2>Coverage By Domain</h2>
            <div id="domains" class="domain-list"></div>
          </section>

          <section class="panel">
            <h2>Top Native Proof Gaps</h2>
            <table class="gap-table">
              <thead>
                <tr>
                  <th>Type</th>
                  <th>Domain</th>
                  <th>Fields</th>
                  <th>Remaining</th>
                </tr>
              </thead>
              <tbody id="type-gaps"></tbody>
            </table>
          </section>

          <section class="panel">
            <h2>Implementation Domains</h2>
            <div id="implementation-domains" class="grid two-up"></div>
          </section>
        </div>

        <aside class="grid">
          <section class="panel">
            <h2>Work In Progress</h2>
            <div id="tasks"></div>
          </section>

          <section class="panel">
            <h2>Recently Completed</h2>
            <div id="recent"></div>
          </section>

          <section class="panel">
            <h2>Payload Preserve Gaps</h2>
            <div id="payload-gaps"></div>
          </section>
        </aside>
      </section>
    </main>

    <script>
      const formatPercent = (value) => `${Number(value || 0).toFixed(1)}%`;

      function progressCard(metric, color) {
        return `
          <article class="metric">
            <div>
              <h3>${metric.label}</h3>
              <div class="metric-value">${metric.proven}/${metric.total}</div>
              <p class="meta">${metric.remaining} remaining</p>
            </div>
            <div>
              <div class="bar" title="${formatPercent(metric.percent)}">
                <span style="--value:${metric.percent}%;--color:${color}"></span>
              </div>
              ${metric.note ? `<p class="meta" style="margin-top:8px">${metric.note}</p>` : ""}
            </div>
          </article>`;
      }

      function renderSummary(summary) {
        const cards = [
          [summary.nativeFieldProof, "var(--good)"],
          [summary.mappedTypeRollup, "var(--info)"],
          [summary.preserveFixtureEvidence, "var(--work)"],
          [summary.payloadPreserveProof, "var(--bad)"],
          [summary.totalHandledTypeCompletion, "#9d8cff"],
        ];
        document.getElementById("summary").innerHTML = cards
          .map(([metric, color]) => progressCard(metric, color))
          .join("");
      }

      function renderDomains(domains) {
        document.getElementById("domains").innerHTML = domains
          .map((domain) => {
            const total = Math.max(1, domain.runtimeFields);
            const proven = (domain.fieldProven / total) * 100;
            const typeOnly = (domain.typeOnlyNeedsFieldAssertion / total) * 100;
            const preserve = (domain.preserveProven / total) * 100;
            const remaining = Math.max(0, 100 - proven - typeOnly - preserve);
            return `
              <div class="domain-row">
                <div>
                  <div class="domain-name">${domain.domain.replaceAll("_", " ")}</div>
                  <div class="meta">${domain.runtimeFields} runtime fields</div>
                </div>
                <div class="stacked" title="${domain.fieldProven} proven, ${domain.typeOnlyNeedsFieldAssertion} type-only, ${domain.preserveProven} preserve-proven">
                  <span class="proven" style="width:${proven}%"></span>
                  <span class="type-only" style="width:${typeOnly}%"></span>
                  <span class="preserve" style="width:${preserve}%"></span>
                  <span class="remaining" style="width:${remaining}%"></span>
                </div>
                <div class="meta">native ${domain.fieldProven}/${domain.nativeFields}</div>
                <div class="meta">preserve ${domain.preserveProven}</div>
              </div>`;
          })
          .join("");
      }

      function renderTasks(manual) {
        const wave = manual.currentWave || {};
        document.getElementById("wave").textContent = `${wave.title || "Coverage wave"}: ${
          wave.target || ""
        }`;
        document.getElementById("tasks").innerHTML = (manual.inProgress || [])
          .map(
            (task) => `
              <article class="task">
                <div class="task-head">
                  <h3>${task.title}</h3>
                  <span class="pill ${task.status}">${task.status}</span>
                </div>
                <p class="meta">${task.domain} / ${task.owner}</p>
                <p style="margin-top:6px">${task.detail}</p>
              </article>`,
          )
          .join("");
      }

      function renderRecent(manual) {
        document.getElementById("recent").innerHTML = (manual.recentlyCompleted || [])
          .map(
            (item) => `
              <article class="timeline-item">
                <div class="timeline-head">
                  <h3>${item.title}</h3>
                  <span class="pill done">${item.commit}</span>
                </div>
                <p>${item.detail}</p>
              </article>`,
          )
          .join("");
      }

      function renderTypeGaps(gaps) {
        document.getElementById("type-gaps").innerHTML = gaps
          .slice(0, 10)
          .map(
            (gap) => `
              <tr>
                <td>${gap.typeName}</td>
                <td>${gap.domain}</td>
                <td>${gap.fieldProven}/${gap.nativeFields}</td>
                <td>${(gap.fieldIds || []).join(", ")}</td>
              </tr>`,
          )
          .join("");
      }

      function renderImplementationDomains(domains) {
        document.getElementById("implementation-domains").innerHTML = domains
          .map(
            (entry) => `
              <article class="task">
                <div class="task-head">
                  <h3>${entry.domain}</h3>
                  <span class="pill">${entry.typeGaps} gaps</span>
                </div>
                <p class="meta">P0 ${entry.p0} / P1 ${entry.p1} / P2 ${entry.p2}</p>
                <p style="margin-top:6px">${entry.preserveRequiredRuntimeFields} preserve-required runtime fields</p>
              </article>`,
          )
          .join("");
      }

      function renderPayloadGaps(gaps) {
        const target = document.getElementById("payload-gaps");
        if (!gaps.length) {
          target.innerHTML = '<p class="subtle">No payload preserve fixture gaps.</p>';
          return;
        }
        target.innerHTML = gaps
          .map(
            (gap) => `
              <article class="task">
                <div class="task-head">
                  <h3>${gap.id}</h3>
                  <span class="pill blocked">${gap.domain}</span>
                </div>
                <p class="meta">${gap.valueType} / key ${gap.key}</p>
                <p style="margin-top:6px">${(gap.requiredNext || []).join(", ")}</p>
              </article>`,
          )
          .join("");
      }

      async function refresh() {
        const response = await fetch("dashboard-data.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Dashboard data failed to load: ${response.status}`);
        }
        const data = await response.json();
        renderSummary(data.summary);
        renderDomains(data.domains);
        renderTasks(data.manual);
        renderRecent(data.manual);
        renderTypeGaps(data.topTypeGaps);
        renderImplementationDomains(data.implementationDomains);
        renderPayloadGaps(data.payloadPreserveMissingFields);
        document.getElementById("refresh").textContent = `Updated ${new Date().toLocaleTimeString()}`;
      }

      refresh().catch((error) => {
        document.getElementById("refresh").textContent = error.message;
      });
      setInterval(refresh, 5000);
    </script>
  </body>
</html>
